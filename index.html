<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hyperlandia Loading Screen</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            /* Fundo em degradê roxo escuro espacial muito foda */
            background: radial-gradient(circle, #2d004d 0%, #0f001a 100%);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Efeito de brilho neon roxo no centro da tela */
        .neon-glow {
            position: absolute;
            width: 600px;
            height: 600px;
            background: rgba(138, 43, 226, 0.15);
            border-radius: 50%;
            filter: blur(120px);
            z-index: 1;
            animation: pulse 4s infinite alternate;
        }

        /* Container principal do texto */
        .logo-container {
            text-align: center;
            z-index: 2;
        }

        /* Nome do seu servidor estilizado em formato digital */
        .server-title {
            font-size: 75px;
            font-weight: 900;
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: 8px;
            margin: 0;
            text-shadow: 0 0 10px #a020f0, 0 0 30px #8a2be2, 0 0 50px #6a0dad;
            animation: float 5s ease-in-out infinite;
        }

        .server-subtitle {
            font-size: 18px;
            color: #da70d6;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-top: 15px;
            opacity: 0.8;
        }

        /* Animações visuais de pulsação e flutuação */
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.6; }
            100% { transform: scale(1.2); opacity: 1; }
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }
    </style>
</head>
<body>

    <div class="neon-glow"></div>

    <div class="logo-container">
        <h1 class="server-title">Hyperlandia</h1>
        <div class="server-subtitle">Bem-vindo ao início do Wipe</div>
    </div>

    <audio loop id="bg-music" style="display:none;">
    <source src="https://cdn.discordapp.com/attachments/1509228213690171434/1509625641916694649/DVRST_-_Close_Eyes_-_320_Kbps.mp3?ex=6a19dbf0&is=6a188a70&hm=8a1507a78e6341f5eb22b3377a8bbc553d36dfec7c3f4dce6515f15272221251&" type="audio/mpeg">
</audio>

<script>
window.addEventListener('load', () => {
    const audio = document.getElementById('bg-music');

    audio.volume = 0.25;

    // força tocar
    const playAudio = () => {
        audio.play().catch(() => {});
    };

    playAudio();

    // alguns navegadores exigem interação
    document.body.addEventListener('click', playAudio);
});
</script>

    <script>
        // Sistema para forçar o áudio a tocar no reprodutor interno do Rust
        window.addEventListener('DOMContentLoaded', () => {
            const audio = document.getElementById('bg-music');
            audio.volume = 0.4; // Volume em 40% para ficar agradável de fundo
            
            // Tenta tocar imediatamente
            const playPromise = audio.play();
            if (playPromise !== undefined) {
                playPromise.catch(error => {
                    console.log("Aguardando inicialização do Rust para iniciar a música.");
                });
            }
        });
    </script>
</body>
</html>
